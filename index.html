<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogesh Singh Yadav — Power Platform & SharePoint Developer</title>
<meta name="description" content="Senior Power Platform & SharePoint Developer · Dubai · SPFx, Dataverse, Power Apps, Power Automate, PL-400">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ee;--white:#fff;--border:#e2dfd9;
  --text:#1a1a1a;--muted:#5e5e5e;--blue:#0a66c2;--blue-dark:#004182;
  --gold:#c9a84c;--gold-light:#e8c97a;--navy:#0f3460;--green:#057642;
  --radius:10px;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:var(--sans);cursor:pointer}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* MORE DROPDOWN */
.more-dd{position:relative;display:inline-block;z-index:300}
.more-menu{position:absolute;top:calc(100% + 8px);left:0;background:var(--white);border:1px solid var(--border);border-radius:10px;min-width:250px;padding:8px 0;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .18s;box-shadow:0 12px 32px rgba(0,0,0,0.22);z-index:500}
.more-dd:hover{z-index:600}
.more-dd:hover .more-menu{opacity:1;visibility:visible;transform:translateY(0)}
.more-heading{font-size:11px;font-weight:600;color:var(--gold);letter-spacing:0.8px;text-transform:uppercase;padding:6px 18px 8px}
.more-item{display:flex;align-items:center;gap:11px;padding:10px 18px;font-size:13px;color:var(--text);border-left:2px solid transparent;transition:all .15s}
.more-item:hover{background:var(--bg);border-left-color:var(--gold);text-decoration:none;padding-left:22px}
.more-item.dim{opacity:0.45;pointer-events:none}
.more-item .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.more-badge{margin-left:auto;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;background:#fef3cd;color:#856404;letter-spacing:0.5px}
.more-badge.gray{background:#eee;color:#999}
.more-divider{height:1px;background:var(--border);margin:6px 0}

/* PAGE */
.page{max-width:1100px;margin:0 auto;padding:20px 16px;display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:20px;align-items:start}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.card.profile-card{overflow:visible;position:relative;z-index:50}

/* COVER + PROFILE */
.cover{height:160px;background:linear-gradient(120deg,var(--navy) 0%,#1a4f7a 45%,var(--gold) 100%);position:relative;overflow:hidden}
.cover::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 80% 30%,rgba(255,255,255,0.12) 0%,transparent 40%),linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:100% 100%,40px 40px}
.cover-badges{position:absolute;top:16px;right:20px;display:flex;gap:10px}
.cover-badge{background:rgba(255,255,255,0.95);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.cover-badge .cb-icon{width:30px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;text-align:center;line-height:1.1;flex-shrink:0}
.cover-badge .cb-text{display:flex;flex-direction:column;line-height:1.2}
.cover-badge .cb-name{font-size:11px;font-weight:700;color:var(--text)}
.cover-badge .cb-org{font-size:9px;color:var(--muted)}

.profile-head{padding:0 24px 22px;position:relative}
.avatar-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:-60px;margin-bottom:14px}
.avatar{width:128px;height:128px;border-radius:50%;background:linear-gradient(135deg,var(--gold-light),var(--gold));border:4px solid var(--white);display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:700;color:var(--navy);position:relative;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.verified{position:absolute;bottom:8px;right:4px;width:34px;height:34px;border-radius:50%;background:var(--gold);border:3px solid var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
.verified-tooltip{position:absolute;bottom:42px;right:-30px;background:var(--navy);color:#fff;font-size:10px;font-weight:600;padding:4px 9px;border-radius:5px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.verified:hover .verified-tooltip{opacity:1}
.verified-tooltip::after{content:'';position:absolute;bottom:-4px;right:38px;width:8px;height:8px;background:var(--navy);transform:rotate(45deg)}

.profile-name-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
h1.pname{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.pl-verified-inline{display:inline-flex;align-items:center;gap:4px;background:#fef3cd;color:#856404;font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px}
.pl-verified-inline svg{width:13px;height:13px;fill:var(--gold)}
.pheadline{font-size:15px;color:var(--text);line-height:1.45;margin-bottom:8px;max-width:560px}
.pmeta{font-size:13px;color:var(--muted);line-height:1.7}
.pmeta .conn{color:var(--blue);font-weight:600}
.pbadges{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.pbadge{font-size:12px;font-weight:500;padding:4px 11px;border-radius:14px}
.pbadge.green{background:#e7f3eb;color:var(--green)}
.pbadge.gold{background:#fef3cd;color:#856404}
.pactions{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
.btn{border-radius:22px;font-size:14px;font-weight:600;padding:8px 22px;transition:all .15s;border:1.5px solid;display:inline-flex;align-items:center;gap:7px}
.btn svg{width:17px;height:17px;fill:currentColor}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-dark);border-color:var(--blue-dark);text-decoration:none}
.btn-outline{background:#fff;color:var(--blue);border-color:var(--blue)}
.btn-outline:hover{background:#eef3f8;text-decoration:none}
.btn-ghost{background:#fff;color:var(--muted);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg);color:var(--text);text-decoration:none}

/* SECTION */
.section{padding:22px 24px}
.sec-title{font-size:19px;font-weight:700;color:var(--text);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.sec-title .add{font-size:13px;font-weight:500;color:var(--blue)}
.about-text{font-size:14px;color:var(--text);line-height:1.75}
.about-text strong{font-weight:600}

/* EXPERIENCE */
.exp{display:flex;gap:15px;padding-bottom:20px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.exp:last-child{border:none;padding:0;margin:0}
.exp-logo{width:50px;height:50px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;text-align:center;line-height:1.2;color:#fff}
.exp-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
.exp-co{font-size:14px;color:var(--text)}
.exp-date{font-size:13px;color:var(--muted);margin-bottom:9px}
.exp-desc{font-size:14px;color:var(--text);line-height:1.65;margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:3px 11px;background:var(--bg);border:1px solid var(--border);border-radius:13px;font-size:12px;color:var(--muted)}

/* SKILLS */
.skills{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.skill{padding:12px 15px;border:1px solid var(--border);border-radius:8px;display:flex;justify-content:space-between;align-items:center;transition:background .15s}
.skill:hover{background:var(--bg)}
.sk-name{font-size:14px;font-weight:500}
.sk-end{font-size:12px;color:var(--muted)}
.sk-top{font-size:10px;font-weight:600;color:#856404;background:#fef3cd;padding:2px 7px;border-radius:3px}

/* CERTS */
.cert{display:flex;gap:15px;padding-bottom:16px;margin-bottom:16px;border-bottom:1px solid var(--border)}
.cert:last-child{border:none;padding:0;margin:0}
.cert-logo{width:46px;height:46px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;text-align:center;line-height:1.2}
.cert-name{font-size:15px;font-weight:600;margin-bottom:2px}
.cert-org{font-size:13px;color:var(--text)}
.cert-date{font-size:13px;color:var(--muted)}

/* RECOMMENDATION */
.rec{padding-bottom:20px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.rec:last-child{border:none;padding:0;margin:0}
.rec-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:11px}
.rec-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.rec-name{font-size:15px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.rec-1st{font-size:11px;color:var(--muted);font-weight:400}
.rec-role{font-size:12px;color:var(--muted);line-height:1.4;margin-top:1px}
.rec-meta{font-size:12px;color:var(--muted);margin-top:3px}
.rec-text{font-size:14px;color:var(--text);line-height:1.7;font-style:italic}

.show-more{text-align:center;padding:14px 0 0;border-top:1px solid var(--border);margin-top:16px}
.show-more button{font-size:14px;font-weight:600;color:var(--muted);background:none;border:none;display:inline-flex;align-items:center;gap:5px}
.show-more button:hover{color:var(--text)}
.show-more svg{width:15px;height:15px;fill:currentColor}

/* SIDEBAR */
.side-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;padding:18px}
.side-title{font-size:16px;font-weight:600;margin-bottom:13px}

/* Featured PL-400 card */
.featured-card{background:linear-gradient(160deg,#fff 0%,#fdf6e3 100%);border:1px solid var(--gold);text-align:center;padding:24px 20px}
.featured-icon{font-size:38px;margin-bottom:10px}
.featured-title{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:8px}
.featured-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px}

/* Reusable link rows */
.link-row{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:8px;border-left:2px solid transparent;transition:all .15s;margin:0 -6px}
.link-row:hover{background:var(--bg);border-left-color:var(--gold);text-decoration:none}
.link-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.link-label{font-size:14px;font-weight:500;color:var(--text)}
.link-badge{margin-left:auto;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;background:#fef3cd;color:#856404;letter-spacing:0.5px}
.link-arrow{margin-left:auto;font-size:14px;color:var(--gold);opacity:0;transition:opacity .15s}
.link-badge ~ .link-arrow{margin-left:8px}
.link-row:hover .link-arrow{opacity:1}

/* Reserved / future card */
.reserved-card{text-align:center;border-style:dashed;background:var(--bg);padding:28px 20px}
.reserved-icon{font-size:30px;margin-bottom:10px;opacity:0.5}
.reserved-text{font-size:14px;font-weight:600;color:var(--muted);margin-bottom:4px}
.reserved-sub{font-size:12px;color:var(--muted);opacity:0.7}

/* FOOTER */
.footer{text-align:center;padding:28px 16px 44px;font-size:12px;color:var(--muted);max-width:1100px;margin:0 auto}
.footer-links{margin-bottom:10px;display:flex;justify-content:center;flex-wrap:wrap;gap:16px}
.footer-links a{color:var(--muted);font-weight:500}
.footer-links a:hover{color:var(--blue)}

/* MOBILE */
@media(max-width:900px){
  .page{grid-template-columns:1fr}
  .sidebar{display:none}
}
@media(max-width:540px){
  .skills{grid-template-columns:1fr}
  .avatar{width:96px;height:96px;font-size:32px;margin-top:-48px}
  .cover{height:120px}
  .cover-badges{flex-direction:column;gap:6px;top:10px;right:10px}
  h1.pname{font-size:20px}
  .avatar-row{flex-direction:column;align-items:flex-start;gap:0}
  .more-menu{left:auto;right:0}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ─── ICONS ───

};

// ─── PROFILE CARD ───
function ProfileCard() {
  return (
    <div className="card profile-card" id="top">
      <div className="cover">
        <div className="cover-badges">
          <div className="cover-badge">

// ─── GENERIC SECTION ───
function Section({id, title, add, children}) {
  return (
    <div className="card" id={id}>
      <div className="section">
        <div className="sec-title">{title}{add && <span className="add">{add}</span>}</div>

// ─── EXPERIENCE ───
const experiences = [
  {logo:'Tech\nSource', color:'#0f3460', title:'Senior Power Platform & SharePoint Developer',

];

function Experience() {
  return (
    <Section id="experience" title="Experience" add="+ Add">
